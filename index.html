<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sylveon X Umbreon ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;

    height: 100vh;
    width: 100vw;

    background-image: url("https://i.pinimg.com/originals/24/5b/fd/245bfd5550975a6faca21bc2a010795f.gif");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    text-align: center;
    color: white;
    overflow: hidden;

    transition: background-image 0.8s ease-in-out;
}

.container {
    margin-top: 100px;
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
}

#nao, #sim {
    position: absolute;
}

#sim {
    background: #00ff88;
    left: 40%;
    top: 60%;
}

#nao {
    background: #ff4d4d;
    left: 55%;
    top: 60%;
}

#site, #final {
    display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
    <h1>Login 💖</h1>
    <input type="text" id="user" placeholder="Nome"><br>
    <input type="password" id="pass" placeholder="Senha"><br>
    <button onclick="logar()">Entrar</button>
    <p id="erro" style="color:red;"></p>
</div>

<!-- SITE -->
<div id="site" class="container">
    <h1>Você aceita ficar comigo para sempre? 💖</h1>

    <button id="sim" onclick="aceitou()">Sim ❤️</button>
    <button id="nao" onmouseover="fugir()">Não 😈</button>
</div>

<!-- FINAL -->
<h1 id="final" style="margin-top:100px;">
    Alex X Davi para sempre 💖
</h1>

<script>
const imagens = [
"https://i.pinimg.com/736x/29/3e/06/293e06e71df20cecf230790c4fd61f9a.jpg",
"https://i.pinimg.com/736x/e0/32/2d/e0322d4ffbcc25f32cdf27cf845ff89e.jpg",
"https://i.pinimg.com/1200x/29/47/d2/2947d2b84ddbb37dddf6b5d884f0eee9.jpg",
"https://i.pinimg.com/736x/36/c9/31/36c9314f25a340c2aa64188d3f9354f2.jpg",
"https://i.pinimg.com/736x/c2/cc/61/c2cc61e59e1f42518deb8a2c48b979ac.jpg",
"https://i.pinimg.com/736x/ef/9f/2e/ef9f2e8e4030101aeb16315a8195bfb5.jpg",
"https://i.pinimg.com/736x/d0/fd/45/d0fd4553695ef890a06bcac86c1def40.jpg"
];

let i = 0;

// LOGIN
function logar() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if (user === "Alex" && pass === "AlexXDavi") {
        document.getElementById("login").style.display = "none";
        document.getElementById("site").style.display = "block";
    } else {
        document.getElementById("erro").innerText = "Senha ou nome errado 😢";
    }
}

// BOTÃO FUGIR
function fugir() {
    let btn = document.getElementById("nao");

    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// ACEITOU
function aceitou() {
    document.getElementById("site").style.display = "none";
    document.getElementById("final").style.display = "block";

    document.body.style.backgroundImage = `url('${imagens[0]}')`;

    setTimeout(iniciarSlide, 1000);
}

// SLIDE
function iniciarSlide() {
    setInterval(() => {
        i++;
        if (i >= imagens.length) i = 0;

        document.body.style.backgroundImage = `url('${imagens[i]}')`;

    }, 3000);
}
</script>

</body>
</html>
